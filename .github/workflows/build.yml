name: Build and Publish Plugin

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: [self-hosted, amd64]
    permissions:
      contents: write
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      
      - name: Install compile-time dependencies from S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: auto
          AWS_ENDPOINT_URL: ${{ secrets.AWS_ENDPOINT_URL }}
        run: |
          mkdir -p $GITHUB_WORKSPACE/.ci-deps && python3 -m venv $GITHUB_WORKSPACE/.ci-deps/awsvenv && $GITHUB_WORKSPACE/.ci-deps/awsvenv/bin/pip install awscli -q
          for dep in plugin-relay-backend plugin-player-data plugin-cosmetics plugin-items plugin-gameplay-runtime plugin-teams plugin-spectator plugin-communicator plugin-scoreboard plugin-chat plugin-permissions plugin-coins; do
            $GITHUB_WORKSPACE/.ci-deps/awsvenv/bin/aws s3 cp "s3://pharogames-plugins/${dep}.jar" "$GITHUB_WORKSPACE/.ci-deps/${dep}.jar" --region "$AWS_REGION" --endpoint-url "$AWS_ENDPOINT_URL"
            mvn install:install-file \
              -Dfile="$GITHUB_WORKSPACE/.ci-deps/${dep}.jar" \
              -DgroupId=com.pharogames \
              -DartifactId="${dep}" \
              -Dversion=1.0.0-SNAPSHOT \
              -Dpackaging=jar -q
            echo "Installed ${dep} to local Maven repo"
          done
      
      - name: Build plugin
        id: build
        run: ./scripts/ci/plugin/build.sh --plugin-dir .
        env:
          CI: true
      
      - name: Upload plugin JAR to S3
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: auto
          AWS_ENDPOINT_URL: ${{ secrets.AWS_ENDPOINT_URL }}
        run: |
          mkdir -p $GITHUB_WORKSPACE/.ci-deps && python3 -m venv $GITHUB_WORKSPACE/.ci-deps/awsvenv && $GITHUB_WORKSPACE/.ci-deps/awsvenv/bin/pip install awscli -q
          ARTIFACT_ID=$(mvn help:evaluate -Dexpression=project.artifactId -q -DforceStdout)
          JAR_FILE=$(ls target/${ARTIFACT_ID}-*.jar | grep -v original | grep -v sources | grep -v javadoc | head -1)
          $GITHUB_WORKSPACE/.ci-deps/awsvenv/bin/aws s3 cp "$JAR_FILE" "s3://pharogames-plugins/${ARTIFACT_ID}.jar" --region "$AWS_REGION" --endpoint-url "$AWS_ENDPOINT_URL"
          echo "Uploaded $JAR_FILE -> s3://pharogames-plugins/${ARTIFACT_ID}.jar"
      
      - name: Update plugin registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: ./scripts/ci/plugin/update-registry.sh --plugin-dir .
        continue-on-error: true
        env:
          CI: true
          PLUGIN_NAME: ${{ steps.build.outputs.plugin_name }}
          ARTIFACT_DIGEST: ${{ steps.build.outputs.artifact_digest }}
          APP_ID: ${{ secrets.APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
          GITHUB_INSTALLATION_ID: ${{ secrets.GITHUB_INSTALLATION_ID }}
          INFRASTRUCTURE_REPO: ${{ vars.INFRASTRUCTURE_REPO || 'https://github.com/PharoGames/infrastructure.git' }}
          INFRASTRUCTURE_BRANCH: ${{ vars.INFRASTRUCTURE_BRANCH || 'main' }}
      
